services:
  # Este servicio debe coincidir con el "Service" al que Dokploy le amarra el dominio:
  # openclaw.pugainversor.com  ->  openclaw-web
  openclaw-web:
    image: ghcr.io/openclaw/openclaw:2026.3.2
    environment:
      HOME: /home/node
      TERM: xterm-256color

      # Obligatorio (ponlo en variables/env de Dokploy)
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN}

      # Opcionales
      OPENCLAW_ALLOW_INSECURE_PRIVATE_WS: ${OPENCLAW_ALLOW_INSECURE_PRIVATE_WS:-}
      CLAUDE_AI_SESSION_KEY: ${CLAUDE_AI_SESSION_KEY:-}
      CLAUDE_WEB_SESSION_KEY: ${CLAUDE_WEB_SESSION_KEY:-}
      CLAUDE_WEB_COOKIE: ${CLAUDE_WEB_COOKIE:-}

    volumes:
      - openclaw_config:/home/node/.openclaw
      - openclaw_workspace:/home/node/.openclaw/workspace

    # Dokploy enruta por red interna; no hace falta "ports:"
    expose:
      - "18789"
      - "18790"

    init: true
    restart: unless-stopped

    command:
      [
        "node",
        "dist/index.js",
        "gateway",
        "--bind",
        "lan",
        "--port",
        "18789",
        "--allow-unconfigured"
      ]

    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://127.0.0.1:18789/healthz', r => process.exit(r.statusCode===200?0:1)).on('error', () => process.exit(1));"
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Contenedor “toolbox” para correr comandos cuando lo necesites:
  # docker exec -it <container> sh
  openclaw-cli:
    image: ghcr.io/openclaw/openclaw:2026.3.2
    network_mode: "service:openclaw-web"
    cap_drop:
      - NET_RAW
      - NET_ADMIN
    security_opt:
      - no-new-privileges:true
    environment:
      HOME: /home/node
      TERM: xterm-256color
      BROWSER: echo

      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN}
      OPENCLAW_ALLOW_INSECURE_PRIVATE_WS: ${OPENCLAW_ALLOW_INSECURE_PRIVATE_WS:-}
      CLAUDE_AI_SESSION_KEY: ${CLAUDE_AI_SESSION_KEY:-}
      CLAUDE_WEB_SESSION_KEY: ${CLAUDE_WEB_SESSION_KEY:-}
      CLAUDE_WEB_COOKIE: ${CLAUDE_WEB_COOKIE:-}

    volumes:
      - openclaw_config:/home/node/.openclaw
      - openclaw_workspace:/home/node/.openclaw/workspace

    stdin_open: true
    tty: true
    init: true
    entrypoint: ["sh", "-lc"]
    command: ["sleep infinity"]
    restart: unless-stopped
    depends_on:
      - openclaw-web

volumes:
  openclaw_config:
  openclaw_workspace:
