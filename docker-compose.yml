services:
  openclaw-gateway:
    image: ghcr.io/openclaw/openclaw:2026.3.2
    restart: unless-stopped
    user: "0:0"
    volumes:
      - openclaw_home:/home/node
    ports:
     - "18789:18789"   # gateway/canvas (ws + http)
     - "18791:18791"   # browser control (http, auth-token)

volumes:
  openclaw_home:
