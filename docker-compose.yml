services:
  openclaw-gateway:
    image: ghcr.io/openclaw/openclaw:2026.3.2
    restart: unless-stopped
    volumes:
      - openclaw_home:/home/node
    expose:
      - "18789"

  openclaw-web:
    image: alpine/socat
    restart: unless-stopped
    depends_on:
      - openclaw-gateway
    network_mode: "service:openclaw-gateway"
    command: ["-dd","TCP-LISTEN:8089,fork,reuseaddr,bind=0.0.0.0","TCP:127.0.0.1:18789"]

volumes:
  openclaw_home:
