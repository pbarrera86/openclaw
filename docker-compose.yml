services:
  # 1) One-shot: arregla permisos de los volúmenes para evitar EACCES
  openclaw-init-perms:
    image: ghcr.io/openclaw/openclaw:2026.3.2
    user: "0:0"
    environment:
      HOME: /home/node
    volumes:
      - openclaw_config:/home/node/.openclaw
      - openclaw_workspace:/home/node/.openclaw/workspace
    entrypoint: ["sh", "-lc"]
    command:
      - |
        set -e
        echo "[init] Fixing permissions on /home/node/.openclaw ..."
        mkdir -p /home/node/.openclaw /home/node/.openclaw/workspace
        chown -R 1000:1000 /home/node/.openclaw
        chmod -R u+rwX,g+rwX /home/node/.openclaw
        echo "[init] Done."
    restart: "no"

  openclaw-web:
    image: ghcr.io/openclaw/openclaw:2026.3.2
    user: "1000:1000"
    environment:
      HOME: /home/node
      TERM: xterm-256color

      # Token del gateway (obligatorio)
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN}

      # --- FIX: Control UI detrás de proxy / bind lan ---
      OPENCLAW_GATEWAY_CONTROLUI_DANGEROUSLY_ALLOW_HOST_HEADER_ORIGIN_FALLBACK: "true"
      OPENCLAW_GATEWAY_CONTROLUI_ALLOWED_ORIGINS: "https://openclaw.pugainversor.com"

      # Opcional (solo si lo necesitas)
      OPENCLAW_ALLOW_INSECURE_PRIVATE_WS: ${OPENCLAW_ALLOW_INSECURE_PRIVATE_WS:-}
      CLAUDE_AI_SESSION_KEY: ${CLAUDE_AI_SESSION_KEY:-}
      CLAUDE_WEB_SESSION_KEY: ${CLAUDE_WEB_SESSION_KEY:-}
      CLAUDE_WEB_COOKIE: ${CLAUDE_WEB_COOKIE:-}

    volumes:
      - openclaw_config:/home/node/.openclaw
      - openclaw_workspace:/home/node/.openclaw/workspace

    expose:
      - "18789"
      - "18790"

    init: true
    restart: unless-stopped

    command: ["node", "dist/index.js", "gateway", "--bind", "lan", "--port", "18789"]

    depends_on:
      openclaw-init-perms:
        condition: service_completed_successfully

    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:18789/healthz').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  openclaw-cli:
    image: ghcr.io/openclaw/openclaw:2026.3.2
    user: "1000:1000"
    network_mode: "service:openclaw-web"
    cap_drop:
      - NET_RAW
      - NET_ADMIN
    security_opt:
      - no-new-privileges:true
    environment:
      HOME: /home/node
      TERM: xterm-256color
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN}
      OPENCLAW_ALLOW_INSECURE_PRIVATE_WS: ${OPENCLAW_ALLOW_INSECURE_PRIVATE_WS:-}
      BROWSER: echo
      CLAUDE_AI_SESSION_KEY: ${CLAUDE_AI_SESSION_KEY:-}
      CLAUDE_WEB_SESSION_KEY: ${CLAUDE_WEB_SESSION_KEY:-}
      CLAUDE_WEB_COOKIE: ${CLAUDE_WEB_COOKIE:-}

      OPENCLAW_GATEWAY_CONTROLUI_DANGEROUSLY_ALLOW_HOST_HEADER_ORIGIN_FALLBACK: "true"
      OPENCLAW_GATEWAY_CONTROLUI_ALLOWED_ORIGINS: "https://openclaw.pugainversor.com"

    volumes:
      - openclaw_config:/home/node/.openclaw
      - openclaw_workspace:/home/node/.openclaw/workspace

    stdin_open: true
    tty: true
    init: true

    # Mantén el contenedor vivo para poder entrar y ejecutar openclaw setup/onboard cuando quieras
    entrypoint: ["sh", "-lc"]
    command: ["tail -f /dev/null"]

    depends_on:
      - openclaw-web

volumes:
  openclaw_config:
  openclaw_workspace:
