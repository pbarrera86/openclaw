services:
  openclaw-gateway:
    image: ghcr.io/openclaw/openclaw:2026.3.2
    restart: unless-stopped
    volumes:
      - openclaw_home:/home/node
    command: ["node", "openclaw.mjs", "gateway", "--allow-unconfigured", "--port", "18789"]
    # NO ports aquí
    # NO network_mode: host

  openclaw-proxy:
    image: alpine/socat
    restart: unless-stopped
    network_mode: "service:openclaw-gateway"
    command: >
      -dd
      TCP-LISTEN:18789,fork,reuseaddr,bind=0.0.0.0
      TCP:127.0.0.1:18789

volumes:
  openclaw_home:
