services:
  # 1) Gateway principal de OpenClaw (API/WebSocket)
  openclaw-gateway:
    image: ghcr.io/openclaw/openclaw:2026.3.2
    environment:
      HOME: /home/node
      TERM: xterm-256color

      # Token del gateway (OBLIGATORIO)
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN}

      # Opcionales (solo si los usas)
      OPENCLAW_ALLOW_INSECURE_PRIVATE_WS: ${OPENCLAW_ALLOW_INSECURE_PRIVATE_WS:-}
      CLAUDE_AI_SESSION_KEY: ${CLAUDE_AI_SESSION_KEY:-}
      CLAUDE_WEB_SESSION_KEY: ${CLAUDE_WEB_SESSION_KEY:-}
      CLAUDE_WEB_COOKIE: ${CLAUDE_WEB_COOKIE:-}

    volumes:
      - openclaw_config:/home/node/.openclaw
      - openclaw_workspace:/home/node/.openclaw/workspace

    # Importante: expone a la red docker (Dokploy / otros contenedores)
    expose:
      - "18789"
      - "18790"
      - "18791"

    init: true
    restart: unless-stopped

    command:
      [
        "node",
        "dist/index.js",
        "gateway",
        "--allow-unconfigured",
        "--bind",
        "lan",
        "--port",
        "18789"
      ]

    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:18789/healthz').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
        ]
      interval: 30s
      timeout: 5s
      retries: 10
      start_period: 30s

  # 2) Web reverse-proxy interno (para que Dokploy enrute el subdominio a este servicio)
  #    Este servicio escucha en 8089 y reenvía al gateway:18789
  openclaw-web:
    image: nginx:alpine
    depends_on:
      - openclaw-gateway
    restart: unless-stopped

    expose:
      - "8089"

    # Nginx inline: proxy hacia openclaw-gateway:18789
    command: >
      /bin/sh -lc 'cat > /etc/nginx/conf.d/default.conf << "EOF"
      server {
        listen 8089;
        server_name _;

        # Básicos de proxy
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSockets (OpenClaw usa WS en 18789)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        location / {
          proxy_pass http://openclaw-gateway:18789;
        }
      }
      EOF
      && nginx -g "daemon off;"'

  # 3) CLI (opcional, útil para ejecutar comandos dentro del mismo network namespace)
  openclaw-cli:
    image: ghcr.io/openclaw/openclaw:2026.3.2
    network_mode: "service:openclaw-gateway"
    cap_drop:
      - NET_RAW
      - NET_ADMIN
    security_opt:
      - no-new-privileges:true
    environment:
      HOME: /home/node
      TERM: xterm-256color
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN}
      OPENCLAW_ALLOW_INSECURE_PRIVATE_WS: ${OPENCLAW_ALLOW_INSECURE_PRIVATE_WS:-}
      BROWSER: echo
      CLAUDE_AI_SESSION_KEY: ${CLAUDE_AI_SESSION_KEY:-}
      CLAUDE_WEB_SESSION_KEY: ${CLAUDE_WEB_SESSION_KEY:-}
      CLAUDE_WEB_COOKIE: ${CLAUDE_WEB_COOKIE:-}
    volumes:
      - openclaw_config:/home/node/.openclaw
      - openclaw_workspace:/home/node/.openclaw/workspace
    stdin_open: true
    tty: true
    init: true
    entrypoint: ["node", "dist/index.js"]
    depends_on:
      - openclaw-gateway

volumes:
  openclaw_config:
  openclaw_workspace:
