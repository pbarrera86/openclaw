services:
  openclaw-web:
    image: ghcr.io/openclaw/openclaw:2026.3.2

    # MUY importante: asegura que escribe en los volúmenes sin EACCES
    user: "1000:1000"

    environment:
      HOME: /home/node
      TERM: xterm-256color

      # Token del gateway (obligatorio)
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN}

      # --- FIX: Control UI detrás de proxy / bind lan ---
      OPENCLAW_GATEWAY_CONTROLUI_DANGEROUSLY_ALLOW_HOST_HEADER_ORIGIN_FALLBACK: "true"
      OPENCLAW_GATEWAY_CONTROLUI_ALLOWED_ORIGINS: "https://openclaw.pugainversor.com"

      # --- FIX: evita el crash por "Missing config" ---
      # Alternativas:
      # A) gateway.mode=local (recomendado para empezar)
      OPENCLAW_GATEWAY_MODE: "local"
      # B) o permitir unconfigured (si tu versión lo soporta)
      # OPENCLAW_GATEWAY_ALLOW_UNCONFIGURED: "true"

      # Opcional
      OPENCLAW_ALLOW_INSECURE_PRIVATE_WS: ${OPENCLAW_ALLOW_INSECURE_PRIVATE_WS:-}
      CLAUDE_AI_SESSION_KEY: ${CLAUDE_AI_SESSION_KEY:-}
      CLAUDE_WEB_SESSION_KEY: ${CLAUDE_WEB_SESSION_KEY:-}
      CLAUDE_WEB_COOKIE: ${CLAUDE_WEB_COOKIE:-}

    volumes:
      - openclaw_config:/home/node/.openclaw
      - openclaw_workspace:/home/node/.openclaw/workspace

    expose:
      - "18789"
      - "18790"

    init: true
    restart: unless-stopped

    command:
      [
        "node",
        "dist/index.js",
        "gateway",
        "--bind",
        "lan",
        "--port",
        "18789"
      ]

    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:18789/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  openclaw-cli:
    image: ghcr.io/openclaw/openclaw:2026.3.2
    user: "1000:1000"

    # Comparte red con el gateway (así apuntas a 127.0.0.1:18789 desde CLI)
    network_mode: "service:openclaw-web"

    cap_drop:
      - NET_RAW
      - NET_ADMIN
    security_opt:
      - no-new-privileges:true

    environment:
      HOME: /home/node
      TERM: xterm-256color
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN}

      # Mantén consistente con web
      OPENCLAW_GATEWAY_MODE: "local"
      OPENCLAW_GATEWAY_CONTROLUI_DANGEROUSLY_ALLOW_HOST_HEADER_ORIGIN_FALLBACK: "true"
      OPENCLAW_GATEWAY_CONTROLUI_ALLOWED_ORIGINS: "https://openclaw.pugainversor.com"

      OPENCLAW_ALLOW_INSECURE_PRIVATE_WS: ${OPENCLAW_ALLOW_INSECURE_PRIVATE_WS:-}
      BROWSER: echo
      CLAUDE_AI_SESSION_KEY: ${CLAUDE_AI_SESSION_KEY:-}
      CLAUDE_WEB_SESSION_KEY: ${CLAUDE_WEB_SESSION_KEY:-}
      CLAUDE_WEB_COOKIE: ${CLAUDE_WEB_COOKIE:-}

    volumes:
      - openclaw_config:/home/node/.openclaw
      - openclaw_workspace:/home/node/.openclaw/workspace

    stdin_open: true
    tty: true
    init: true

    # Importante: no queremos que se cierre al terminar un comando
    entrypoint: ["sh", "-lc"]
    command: ["sleep infinity"]

    depends_on:
      - openclaw-web

volumes:
  openclaw_config:
  openclaw_workspace:
